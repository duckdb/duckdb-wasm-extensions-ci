#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - 'doc/**'
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - 'doc/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: ./.github/workflows/_extension_distribution.yml
    with:
      duckdb_version: v0.10.3
      extension_name: spatial
      exclude_archs: 'windows_amd64;windows_amd64_rtools;osx_arm64;osx_amd64;linux_arm64;linux_amd64;linux_arm64;linux_amd64_gcc4'

  duckdb-stable-deploy:
    name: Deploy extension binaries
    needs: duckdb-stable-build
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_deploy.yml@v0.10.3
    secrets: inherit
    with:
      duckdb_version: v0.10.3
      extension_name: spatial
      deploy_latest: true
      exclude_archs: 'windows_amd64;windows_amd64_rtools;osx_arm64;osx_amd64;linux_arm64;linux_amd64;linux_arm64;linux_amd64_gcc4'
